steps:
  # 1) Build the image, tagged with the commit SHA and 'latest'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/stratus-500215/stratus/app:$SHORT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/stratus-500215/stratus/app:latest'
      - '.'

  # 2) Push both tags to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/stratus-500215/stratus/app'

  # 3) Deploy the new image to Cloud Run (keeps env, secret, VPC settings)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'stratus-app'
      - '--image=us-central1-docker.pkg.dev/stratus-500215/stratus/app:$SHORT_SHA'
      - '--region=us-central1'

images:
  - 'us-central1-docker.pkg.dev/stratus-500215/stratus/app:$SHORT_SHA'
  - 'us-central1-docker.pkg.dev/stratus-500215/stratus/app:latest'

options:
  logging: 'CLOUD_LOGGING_ONLY'