# One command to run the whole thing locally: `docker compose up --build`
# This gives you a local PostgreSQL — NO cloud account needed.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: store
      POSTGRES_PASSWORD: localpass
      POSTGRES_DB: store
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U store"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    environment:
      DB_USER: store
      DB_PASSWORD: localpass
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: store
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
